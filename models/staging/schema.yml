version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'processing', 'approved', 'invoiced', 'unavailable', 'unknown']

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: city
        tests:
          - not_null

      - name: etat
        tests:
          - not_null

          - name: city_etat
        tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null

        
      - name: category
        tests:
          - not_null

  - name: stg_payments
    columns:
      - name: order_id
        tests:
          - not_null

      - name: payment
        tests:
          - not_null

      - name: typepaiement
        tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          expression: "payment >= 0"

  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null


      - name: price
        tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          expression: "price >= 0"